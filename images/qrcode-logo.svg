<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#gradient)" opacity="0.1" rx="50" ry="50"/>
  
  <!-- QR码框架 -->
  <g fill="url(#gradient)">
    <!-- 左上角定位点 -->
    <rect x="72" y="72" width="96" height="96" rx="12" ry="12"/>
    <rect x="88" y="88" width="64" height="64" fill="white"/>
    <rect x="104" y="104" width="32" height="32"/>
    
    <!-- 右上角定位点 -->
    <rect x="344" y="72" width="96" height="96" rx="12" ry="12"/>
    <rect x="360" y="88" width="64" height="64" fill="white"/>
    <rect x="376" y="104" width="32" height="32"/>
    
    <!-- 左下角定位点 -->
    <rect x="72" y="344" width="96" height="96" rx="12" ry="12"/>
    <rect x="88" y="360" width="64" height="64" fill="white"/>
    <rect x="104" y="376" width="32" height="32"/>
    
    <!-- 中间QR码元素 -->
    <g>
      <rect x="200" y="72" width="32" height="32"/>
      <rect x="264" y="72" width="32" height="32"/>
      <rect x="72" y="200" width="32" height="32"/>
      <rect x="136" y="200" width="32" height="32"/>
      <rect x="200" y="200" width="32" height="32"/>
      <rect x="264" y="200" width="32" height="32"/>
      <rect x="344" y="200" width="32" height="32"/>
      <rect x="408" y="200" width="32" height="32"/>
      <rect x="200" y="264" width="32" height="32"/>
      <rect x="264" y="264" width="32" height="32"/>
      <rect x="328" y="264" width="32" height="32"/>
      <rect x="392" y="264" width="32" height="32"/>
      <rect x="200" y="328" width="32" height="32"/>
      <rect x="264" y="328" width="32" height="32"/>
      <rect x="328" y="328" width="32" height="32"/>
      <rect x="392" y="328" width="32" height="32"/>
      <rect x="200" y="392" width="32" height="32"/>
      <rect x="264" y="392" width="32" height="32"/>
    </g>
  </g>
  
  <!-- 扫描线动画效果 -->
  <rect x="72" y="256" width="368" height="4" fill="#ffffff" opacity="0.8">
    <animate attributeName="y" from="100" to="412" dur="2s" repeatCount="indefinite"/>
  </rect>
  
  <!-- 文字 -->
  <text x="256" y="480" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="url(#gradient)">二维码生成器</text>
</svg> 